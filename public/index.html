<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Sistem Inventaris Gudang</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ccc; padding: 8px; }
        th { background: #eee; }
    </style>
</head>
<body>
    <h2>Input Barang Baru</h2>
    <input id="brand" placeholder="Brand">
    <input id="part" placeholder="Part Number">
    <input id="nama" placeholder="Nama Barang">
    <input id="stok" type="number" placeholder="Stok Awal">
    <input id="uom" placeholder="Uom">
    <input id="note" placeholder="Note">
    <button onclick="simpan()">Simpan</button>

    <table>
        <thead>
            <tr><th>Brand</th><th>Part Number</th><th>Barang</th><th>Stok Awal</th><th>Uom</th><th>Note</th><th>Stok Akhir</th></tr>
        </thead>
        <tbody id="tabel-body"></tbody>
    </table>
    <script src="app.js"></script>
</body>
</html>
